<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Naama Melzer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
</head>
<body class="page-fade">

  <header>
    <span class="nav-brand">Naama Melzer</span>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="Video.html">Video Editing</a></li>
        <li><a href="Art.html">Art Design</a></li>
        <li><a href="CostumeDesgine.html">Costume Design</a></li>
        <li><a href="ContactUs.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <div class="section-header" style="padding-top:120px">
    <p class="label">Get in Touch</p>
    <h2>Contact</h2>
    <div class="rule"></div>
  </div>

  <div class="contact-wrapper">
    <div class="contact-info">
      <h2>Let's Work Together</h2>
      <div class="ci-item"><i class="fas fa-map-marker-alt"></i><span>Tel Aviv, Israel</span></div>
      <div class="ci-item"><i class="fas fa-phone"></i><span>052-864-4582</span></div>
      <div class="ci-item"><i class="fas fa-envelope"></i><a href="mailto:Naamamelzer@gmail.com">Naamamelzer@gmail.com</a></div>
      <div class="ci-item"><i class="fab fa-instagram"></i><a href="https://www.instagram.com/nm._art_/" target="_blank">nm._art_</a></div>
    </div>

    <div class="contact-form-side">
      <h3>Send a Message</h3>
      <form id="contact-form" action="#" method="POST">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" required placeholder="Your name">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="phone">Phone (optional)</label>
          <input type="text" id="phone" name="phone" placeholder="Your phone number">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="Tell me about your project…"></textarea>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">
          <i class="fas fa-paper-plane"></i> Send Message
        </button>
      </form>
    </div>
  </div>

  <!-- Status Modal -->
  <div id="statusModal" class="status-modal">
    <div class="status-modal-content">
      <button class="close" id="closeStatusModal">&times;</button>
      <p id="statusMessage"></p>
    </div>
  </div>

  <footer>
    <p>&copy; 2024 Naama Melzer &mdash; All rights reserved</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
